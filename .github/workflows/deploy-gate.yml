name: Deploy Gatekeeper

on:
  push:
    branches: [main]

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for Deploy Keyword
        shell: bash
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          echo "Commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"[deploy]"* ]]; then
            echo "Keyword found! Proceeding with Railway deployment."
            exit 0
          else
            echo "Keyword '[deploy]' not found. Skipping Railway deployment."
            exit 1
          fi